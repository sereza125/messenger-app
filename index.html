<!DOCTYPE html>
<html>
<head>
    <title>Python Messenger</title>
    <meta charset="UTF-8">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .chat-container { width: 100%; max-width: 500px; height: 80vh; min-height: 500px; background: white; border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); display: flex; flex-direction: column; overflow: hidden; }
        .chat-header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 20px; color: white; text-align: center; }
        .chat-header h2 { font-size: 24px; }
        .chat-header small { opacity: 0.9; font-size: 12px; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 20px; background: #f5f5f5; }
        .message { margin-bottom: 15px; padding: 12px 16px; border-radius: 18px; max-width: 80%; word-wrap: break-word; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .message.sent { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; margin-left: auto; border-bottom-right-radius: 4px; }
        .message.received { background: white; color: #333; border-bottom-left-radius: 4px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .message .username { font-size: 12px; font-weight: bold; margin-bottom: 4px; opacity: 0.8; }
        .message .time { font-size: 10px; opacity: 0.6; margin-top: 4px; text-align: right; }
        .chat-input { padding: 20px; background: white; border-top: 1px solid #eee; display: flex; gap: 10px; }
        .chat-input input { flex: 1; padding: 12px 16px; border: 2px solid #eee; border-radius: 25px; outline: none; font-size: 14px; transition: border-color 0.3s; }
        .chat-input input:focus { border-color: #667eea; }
        .chat-input button { padding: 12px 24px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 25px; cursor: pointer; font-size: 14px; font-weight: bold; transition: transform 0.2s; }
        .chat-input button:hover { transform: scale(1.05); }
        .chat-input button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .login-box { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); text-align: center; width: 90%; max-width: 350px; }
        .login-box h2 { margin-bottom: 20px; color: #333; font-size: 28px; }
        .login-box input { width: 100%; padding: 15px; margin-bottom: 20px; border: 2px solid #eee; border-radius: 10px; font-size: 16px; outline: none; transition: border-color 0.3s; }
        .login-box input:focus { border-color: #667eea; }
        .login-box button { width: 100%; padding: 15px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; transition: transform 0.2s; }
        .login-box button:hover { transform: scale(1.02); }
        .system-message { text-align: center; color: #666; font-size: 12px; margin: 10px 0; font-style: italic; }
        .status { position: absolute; top: 20px; right: 20px; width: 10px; height: 10px; border-radius: 50%; background: #ff4444; }
        .status.connected { background: #44ff44; }
        .error-message { background: #ff4444; color: white; padding: 10px; border-radius: 10px; margin-bottom: 10px; text-align: center; font-size: 14px; }
    </style>
</head>
<body>
    <div class="login-overlay" id="loginOverlay">
        <div class="login-box">
            <h2>💬 Войти</h2>
            <input type="text" id="usernameInput" placeholder="Ваше имя..." maxlength="20" autocomplete="off">
            <button onclick="login()">Войти в чат</button>
        </div>
    </div>

    <div class="chat-container" id="chatContainer" style="display: none;">
        <div class="chat-header">
            <div class="status" id="status"></div>
            <h2>Python Messenger</h2>
            <small id="userDisplay"></small>
        </div>
        <div class="chat-messages" id="messages"></div>
        <div class="chat-input">
            <input type="text" id="messageInput" placeholder="Сообщение..." maxlength="500" autocomplete="off">
            <button onclick="sendMessage()" id="sendBtn">➤</button>
        </div>
    </div>

    <script>
        let socket;
        let username;
        let connected = false;
        let reconnectInterval;

        const loginOverlay = document.getElementById('loginOverlay');
        const chatContainer = document.getElementById('chatContainer');
        const usernameInput = document.getElementById('usernameInput');
        const messageInput = document.getElementById('messageInput');
        const messagesDiv = document.getElementById('messages');
        const userDisplay = document.getElementById('userDisplay');
        const status = document.getElementById('status');
        const sendBtn = document.getElementById('sendBtn');

        function login() {
            username = usernameInput.value.trim();
            if (!username) {
                alert('Введите имя!');
                return;
            }
            
            loginOverlay.style.display = 'none';
            chatContainer.style.display = 'flex';
            userDisplay.textContent = username;
            
            connect();
        }

        function connect() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${window.location.hostname}:8767`;
            
            try {
                socket = new WebSocket(wsUrl);
                
                socket.onopen = () => {
                    console.log('Connected');
                    connected = true;
                    status.classList.add('connected');
                    sendBtn.disabled = false;
                    
                    socket.send(JSON.stringify({
                        type: 'login',
                        username: username
                    }));
                    
                    if (reconnectInterval) {
                        clearInterval(reconnectInterval);
                        reconnectInterval = null;
                    }
                };
                
                socket.onmessage = (event) => {
                    try {
                        const data = JSON.parse(event.data);
                        displayMessage(data);
                    } catch (e) {
                        console.error('Invalid message:', event.data);
                    }
                };
                
                socket.onclose = () => {
                    console.log('Disconnected');
                    connected = false;
                    status.classList.remove('connected');
                    sendBtn.disabled = true;
                    addSystemMessage('Соединение потеряно. Переподключение...');
                    
                    if (!reconnectInterval) {
                        reconnectInterval = setInterval(connect, 3000);
                    }
                };
                
                socket.onerror = (error) => {
                    console.error('WebSocket error:', error);
                };
                
            } catch (e) {
                console.error('Connection error:', e);
            }
        }

        function displayMessage(data) {
            const div = document.createElement('div');
            
            if (data.type === 'system') {
                div.className = 'system-message';
                div.textContent = data.message;
            } else if (data.type === 'message') {
                const isMe = data.username === username;
                div.className = `message ${isMe ? 'sent' : 'received'}`;
                
                const time = data.timestamp ? new Date(data.timestamp).toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' }) : '';
                
                div.innerHTML = `
                    ${!isMe ? `<div class="username">${escapeHtml(data.username)}</div>` : ''}
                    <div>${escapeHtml(data.message)}</div>
                    <div class="time">${time}</div>
                `;
            }
            
            messagesDiv.appendChild(div);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function addSystemMessage(text) {
            const div = document.createElement('div');
            div.className = 'system-message';
            div.textContent = text;
            messagesDiv.appendChild(div);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function sendMessage() {
            if (!connected || !socket) {
                addSystemMessage('Нет соединения с сервером');
                return;
            }
            
            const text = messageInput.value.trim();
            if (!text) return;
            
            socket.send(JSON.stringify({
                type: 'message',
                message: text,
                timestamp: new Date().toISOString()
            }));
            
            messageInput.value = '';
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        usernameInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') login();
        });

        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        sendBtn.disabled = true;
    </script>
</body>
</html>
