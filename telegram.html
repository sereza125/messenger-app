<!DOCTYPE html>
<html>
<head>
    <title>Telegram Messenger</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        body { background: #0f1419; height: 100vh; overflow: hidden; }
        
        /* Login Screen */
        .login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #17212b; display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .login-box { text-align: center; padding: 40px; }
        .login-box .logo { width: 120px; height: 120px; background: linear-gradient(135deg, #2b5278 0%, #1a3a5c 100%); border-radius: 50%; margin: 0 auto 30px; display: flex; align-items: center; justify-content: center; font-size: 60px; }
        .login-box h1 { color: #fff; font-size: 28px; margin-bottom: 10px; }
        .login-box p { color: #7a8b9a; margin-bottom: 30px; }
        .login-box input { width: 300px; padding: 15px 20px; background: #242f3d; border: none; border-radius: 10px; color: #fff; font-size: 16px; margin-bottom: 20px; }
        .login-box input:focus { outline: none; box-shadow: 0 0 0 2px #2b5278; }
        .login-box button { width: 300px; padding: 15px; background: #2b5278; border: none; border-radius: 10px; color: #fff; font-size: 16px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
        .login-box button:hover { background: #3a6d99; }
        
        /* Main App */
        .app { display: flex; height: 100vh; }
        
        /* Sidebar */
        .sidebar { width: 360px; background: #17212b; border-right: 1px solid #242f3d; display: flex; flex-direction: column; }
        .sidebar-header { padding: 15px 20px; background: #17212b; border-bottom: 1px solid #242f3d; }
        .sidebar-header h2 { color: #fff; font-size: 20px; font-weight: 600; }
        .search-box { padding: 10px 15px; }
        .search-box input { width: 100%; padding: 10px 15px; background: #242f3d; border: none; border-radius: 20px; color: #fff; font-size: 14px; }
        .search-box input::placeholder { color: #7a8b9a; }
        
        /* Chat List */
        .chat-list { flex: 1; overflow-y: auto; }
        .chat-item { display: flex; padding: 12px 15px; cursor: pointer; transition: background 0.2s; border-bottom: 1px solid #242f3d; }
        .chat-item:hover { background: #1e2a38; }
        .chat-item.active { background: #2b5278; }
        .chat-avatar { width: 50px; height: 50px; border-radius: 50%; background: linear-gradient(135deg, #2b5278 0%, #1a3a5c 100%); display: flex; align-items: center; justify-content: center; color: #fff; font-size: 20px; font-weight: 600; margin-right: 12px; flex-shrink: 0; }
        .chat-info { flex: 1; min-width: 0; }
        .chat-header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
        .chat-name { color: #fff; font-weight: 600; font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .chat-time { color: #7a8b9a; font-size: 12px; }
        .chat-preview { color: #7a8b9a; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .unread-badge { background: #2b5278; color: #fff; font-size: 12px; padding: 2px 8px; border-radius: 10px; margin-left: 8px; }
        
        /* Main Chat */
        .main-chat { flex: 1; display: flex; flex-direction: column; background: #0f1419; }
        .chat-header { padding: 15px 20px; background: #17212b; border-bottom: 1px solid #242f3d; display: flex; align-items: center; }
        .chat-header .avatar { width: 42px; height: 42px; border-radius: 50%; background: linear-gradient(135deg, #2b5278 0%, #1a3a5c 100%); display: flex; align-items: center; justify-content: center; color: #fff; font-size: 18px; font-weight: 600; margin-right: 15px; }
        .chat-header .info h3 { color: #fff; font-size: 16px; font-weight: 600; }
        .chat-header .info span { color: #7a8b9a; font-size: 13px; }
        
        /* Messages Area */
        .messages-area { flex: 1; overflow-y: auto; padding: 20px; }
        .message-group { margin-bottom: 15px; }
        .message { max-width: 70%; padding: 10px 14px; border-radius: 12px; margin-bottom: 2px; position: relative; word-wrap: break-word; }
        .message.incoming { background: #182533; color: #fff; margin-right: auto; border-bottom-left-radius: 4px; }
        .message.outgoing { background: #2b5278; color: #fff; margin-left: auto; border-bottom-right-radius: 4px; }
        .message .sender { font-size: 13px; color: #6ab2f2; font-weight: 600; margin-bottom: 4px; }
        .message .text { font-size: 15px; line-height: 1.4; }
        .message .meta { display: flex; justify-content: flex-end; align-items: center; gap: 5px; margin-top: 4px; }
        .message .time { font-size: 12px; opacity: 0.7; }
        .message .status { font-size: 12px; }
        .date-divider { text-align: center; margin: 20px 0; }
        .date-divider span { background: #1e2a38; color: #7a8b9a; padding: 5px 15px; border-radius: 15px; font-size: 13px; }
        
        /* Input Area */
        .input-area { padding: 15px 20px; background: #17212b; border-top: 1px solid #242f3d; display: flex; align-items: center; gap: 15px; }
        .input-area input { flex: 1; padding: 12px 20px; background: #242f3d; border: none; border-radius: 22px; color: #fff; font-size: 15px; }
        .input-area input::placeholder { color: #7a8b9a; }
        .input-area input:focus { outline: none; }
        .input-area button { width: 44px; height: 44px; border-radius: 50%; background: #2b5278; border: none; color: #fff; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .input-area button:hover { background: #3a6d99; }
        .typing-indicator { color: #7a8b9a; font-size: 14px; padding: 5px 20px; height: 20px; }
        
        /* Empty State */
        .empty-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #7a8b9a; }
        .empty-state .icon { font-size: 80px; margin-bottom: 20px; opacity: 0.5; }
        .empty-state h3 { font-size: 20px; margin-bottom: 10px; }
        
        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #2b5278; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #3a6d99; }
        
        /* New Chat Button */
        .new-chat-btn { position: fixed; bottom: 30px; right: 30px; width: 60px; height: 60px; border-radius: 50%; background: #2b5278; border: none; color: #fff; font-size: 30px; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.3); z-index: 100; }
        .new-chat-btn:hover { background: #3a6d99; transform: scale(1.05); }
    </style>
</head>
<body>
    <!-- Login Screen -->
    <div class="login-screen" id="loginScreen">
        <div class="login-box">
            <div class="logo">&#9993;</div>
            <h1>Telegram Clone</h1>
            <p>Введите имя для входа в мессенджер</p>
            <input type="text" id="usernameInput" placeholder="Ваше имя" maxlength="20">
            <button onclick="login()">Войти</button>
        </div>
    </div>

    <!-- Main App -->
    <div class="app" id="app" style="display: none;">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-header">
                <h2>Чаты</h2>
            </div>
            <div class="search-box">
                <input type="text" placeholder="Поиск" id="searchInput" oninput="filterChats()">
            </div>
            <div class="chat-list" id="chatList">
                <div class="chat-item active" onclick="selectChat('all')">
                    <div class="chat-avatar">&#128226;</div>
                    <div class="chat-info">
                        <div class="chat-header-row">
                            <span class="chat-name">Общий чат</span>
                            <span class="chat-time"></span>
                        </div>
                        <div class="chat-preview">Нажмите для входа в общий чат</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Main Chat Area -->
        <div class="main-chat" id="mainChat">
            <div class="empty-state" id="emptyState">
                <div class="icon">&#9993;</div>
                <h3>Выберите чат</h3>
                <p>Начните общение с друзьями</p>
            </div>
            
            <div class="chat-header" id="chatHeader" style="display: none;">
                <div class="avatar" id="headerAvatar">?</div>
                <div class="info">
                    <h3 id="headerName">Chat Name</h3>
                    <span id="headerStatus">online</span>
                </div>
            </div>
            
            <div class="typing-indicator" id="typingIndicator"></div>
            
            <div class="messages-area" id="messagesArea" style="display: none;"></div>
            
            <div class="input-area" id="inputArea" style="display: none;">
                <input type="text" id="messageInput" placeholder="Написать сообщение..." onkeypress="handleKeyPress(event)">
                <button onclick="sendMessage()">&#10148;</button>
            </div>
        </div>
    </div>

    <script>
        let socket;
        let username;
        let currentChat = null;
        let usersOnline = [];
        let typingTimeout;

        // Generate avatar color based on name
        function getAvatarColor(name) {
            const colors = ['#2b5278', '#1a3a5c', '#3d6d99', '#2d5a87', '#1e4a70'];
            let hash = 0;
            for (let i = 0; i < name.length; i++) {
                hash = name.charCodeAt(i) + ((hash << 5) - hash);
            }
            return colors[Math.abs(hash) % colors.length];
        }

        // Get initials from name
        function getInitials(name) {
            return name.charAt(0).toUpperCase();
        }

        function login() {
            username = document.getElementById('usernameInput').value.trim();
            if (!username) return;

            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('app').style.display = 'flex';

            connectWebSocket();
        }

        function connectWebSocket() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            socket = new WebSocket(`${protocol}//${window.location.hostname}:8771`);

            socket.onopen = () => {
                socket.send(JSON.stringify({
                    type: 'login',
                    username: username
                }));
            };

            socket.onmessage = (event) => {
                const data = JSON.parse(event.data);
                handleMessage(data);
            };

            socket.onclose = () => {
                setTimeout(connectWebSocket, 3000);
            };

            socket.onerror = (error) => {
                console.error('WebSocket error:', error);
            };
        }

        function handleMessage(data) {
            switch(data.type) {
                case 'login_success':
                    usersOnline = data.users_online.filter(u => u !== username);
                    updateOnlineUsersList();
                    break;
                    
                case 'user_joined':
                    usersOnline = data.users_online.filter(u => u !== username);
                    updateOnlineUsersList();
                    if (data.username !== username) {
                        addSystemMessage(`${data.username} присоединился`);
                    }
                    break;
                    
                case 'user_left':
                    usersOnline = data.users_online.filter(u => u !== username);
                    updateOnlineUsersList();
                    addSystemMessage(`${data.username} вышел`);
                    break;
                    
                case 'new_message':
                    if (data.recipient === 'all' || data.recipient === username || data.sender === username) {
                        displayMessage(data);
                        if (data.sender !== username && currentChat === (data.recipient === 'all' ? 'all' : data.sender)) {
                            sendReadReceipt(data.sender);
                        }
                    }
                    break;
                    
                case 'chat_history':
                    loadChatHistory(data.messages);
                    break;
                    
                case 'typing':
                    showTypingIndicator(data.username);
                    break;
                    
                case 'message_sent':
                    updateMessageStatus(data.message_id, 'sent');
                    break;
                    
                case 'messages_read':
                    updateAllMessagesStatus('read');
                    break;
            }
        }

        function updateOnlineUsersList() {
            const chatList = document.getElementById('chatList');
            let html = `
                <div class="chat-item ${currentChat === 'all' ? 'active' : ''}" onclick="selectChat('all')">
                    <div class="chat-avatar" style="background: linear-gradient(135deg, #2b5278 0%, #1a3a5c 100%);">&#128226;</div>
                    <div class="chat-info">
                        <div class="chat-header-row">
                            <span class="chat-name">Общий чат</span>
                        </div>
                        <div class="chat-preview">Все пользователи</div>
                    </div>
                </div>
            `;
            
            usersOnline.forEach(user => {
                html += `
                    <div class="chat-item ${currentChat === user ? 'active' : ''}" onclick="selectChat('${user}')">
                        <div class="chat-avatar" style="background: ${getAvatarColor(user)};">${getInitials(user)}</div>
                        <div class="chat-info">
                            <div class="chat-header-row">
                                <span class="chat-name">${escapeHtml(user)}</span>
                                <span class="chat-time">online</span>
                            </div>
                            <div class="chat-preview">Нажмите для начала чата</div>
                        </div>
                    </div>
                `;
            });
            
            chatList.innerHTML = html;
        }

        function selectChat(chatWith) {
            currentChat = chatWith;
            updateOnlineUsersList();
            
            document.getElementById('emptyState').style.display = 'none';
            document.getElementById('chatHeader').style.display = 'flex';
            document.getElementById('messagesArea').style.display = 'block';
            document.getElementById('inputArea').style.display = 'flex';
            
            const headerName = document.getElementById('headerName');
            const headerAvatar = document.getElementById('headerAvatar');
            
            if (chatWith === 'all') {
                headerName.textContent = 'Общий чат';
                headerAvatar.textContent = '📢';
                headerAvatar.style.background = 'linear-gradient(135deg, #2b5278 0%, #1a3a5c 100%)';
            } else {
                headerName.textContent = chatWith;
                headerAvatar.textContent = getInitials(chatWith);
                headerAvatar.style.background = getAvatarColor(chatWith);
            }
            
            document.getElementById('messagesArea').innerHTML = '';
            
            socket.send(JSON.stringify({
                type: 'get_history',
                with_user: chatWith
            }));
        }

        function loadChatHistory(messages) {
            const area = document.getElementById('messagesArea');
            area.innerHTML = '';
            
            messages.forEach(msg => {
                const isOutgoing = msg.sender === username;
                const msgDiv = document.createElement('div');
                msgDiv.className = `message ${isOutgoing ? 'outgoing' : 'incoming'}`;
                
                const time = new Date(msg.timestamp).toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
                
                msgDiv.innerHTML = `
                    ${!isOutgoing ? `<div class="sender">${escapeHtml(msg.sender)}</div>` : ''}
                    <div class="text">${escapeHtml(msg.content)}</div>
                    <div class="meta">
                        <span class="time">${time}</span>
                        ${isOutgoing ? `<span class="status">${msg.is_read ? '&#10003;&#10003;' : '&#10003;'}</span>` : ''}
                    </div>
                `;
                
                area.appendChild(msgDiv);
            });
            
            area.scrollTop = area.scrollHeight;
        }

        function displayMessage(data) {
            // Don't show if not in current chat context
            if (!currentChat) return;
            
            // Global chat: show all broadcast messages
            if (currentChat === 'all' && data.recipient === 'all') {
                // OK
            }
            // Private chat: show messages between me and current chat partner
            else if (currentChat !== 'all') {
                const isBetweenUs = (data.sender === username && data.recipient === currentChat) ||
                                     (data.sender === currentChat && data.recipient === username);
                if (!isBetweenUs) return;
            }
            else {
                return;
            }
            
            const area = document.getElementById('messagesArea');
            const isOutgoing = data.sender === username;
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${isOutgoing ? 'outgoing' : 'incoming'}`;
            msgDiv.id = `msg-${data.message_id}`;
            
            const time = new Date(data.timestamp).toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
            
            msgDiv.innerHTML = `
                ${!isOutgoing ? `<div class="sender">${escapeHtml(data.sender)}</div>` : ''}
                <div class="text">${escapeHtml(data.content)}</div>
                <div class="meta">
                    <span class="time">${time}</span>
                    ${isOutgoing ? `<span class="status" id="status-${data.message_id}">&#10003;</span>` : ''}
                </div>
            `;
            
            area.appendChild(msgDiv);
            area.scrollTop = area.scrollHeight;
        }

        function sendMessage() {
            const input = document.getElementById('messageInput');
            const content = input.value.trim();
            if (!content || !socket || socket.readyState !== WebSocket.OPEN) return;
            
            const messageId = Date.now().toString();
            
            socket.send(JSON.stringify({
                type: 'message',
                content: content,
                recipient: currentChat || 'all',
                message_id: messageId
            }));
            
            input.value = '';
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            } else {
                showTyping();
            }
        }

        function showTyping() {
            if (!currentChat || currentChat === 'all') return;
            
            clearTimeout(typingTimeout);
            socket.send(JSON.stringify({
                type: 'typing',
                recipient: currentChat
            }));
            
            typingTimeout = setTimeout(() => {}, 3000);
        }

        function showTypingIndicator(user) {
            if (user !== currentChat) return;
            
            const indicator = document.getElementById('typingIndicator');
            indicator.textContent = `${user} печатает...`;
            
            setTimeout(() => {
                indicator.textContent = '';
            }, 3000);
        }

        function sendReadReceipt(sender) {
            socket.send(JSON.stringify({
                type: 'mark_read',
                sender: sender
            }));
        }

        function updateMessageStatus(messageId, status) {
            const statusEl = document.getElementById(`status-${messageId}`);
            if (statusEl) {
                statusEl.innerHTML = status === 'read' ? '&#10003;&#10003;' : '&#10003;';
            }
        }

        function updateAllMessagesStatus(status) {
            document.querySelectorAll('.message.outgoing .status').forEach(el => {
                el.innerHTML = status === 'read' ? '&#10003;&#10003;' : '&#10003;';
            });
        }

        function addSystemMessage(text) {
            const area = document.getElementById('messagesArea');
            if (!area) return;
            
            const div = document.createElement('div');
            div.className = 'date-divider';
            div.innerHTML = `<span>${escapeHtml(text)}</span>`;
            area.appendChild(div);
            area.scrollTop = area.scrollHeight;
        }

        function filterChats() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const items = document.querySelectorAll('.chat-item');
            
            items.forEach(item => {
                const name = item.querySelector('.chat-name').textContent.toLowerCase();
                item.style.display = name.includes(search) ? 'flex' : 'none';
            });
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        document.getElementById('usernameInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') login();
        });
    </script>
</body>
</html>
